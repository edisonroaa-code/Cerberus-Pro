name: Recall Guard

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  recall-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm ci

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run recall guard
        run: npm run guard:recall

      - name: Run deprecation guard
        run: npm run guard:deprecations

      - name: Run route surface regression tests
        run: pytest backend/tests/test_recall_route_surface.py -q

      - name: Run system sync smoke test
        run: pytest backend/tests/test_system_sync.py -q

      - name: Run strict deprecation smoke tests
        run: |
          pytest backend/tests/test_worker_integration.py -q -W error::DeprecationWarning
          pytest backend/tests/test_coverage_api_v1.py -q -W error::DeprecationWarning
          pytest backend/tests/test_recall_route_surface.py -q -W error::DeprecationWarning
